name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality Gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: E2E
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Coverage
        run: npm run test:coverage

      - name: Setup Rust
        if: ${{ hashFiles('src-tauri/Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.84.0

      - name: Cache Rust
        if: ${{ hashFiles('src-tauri/Cargo.toml') != '' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo check
        if: ${{ hashFiles('src-tauri/Cargo.toml') != '' }}
        run: npm run cargo:check
