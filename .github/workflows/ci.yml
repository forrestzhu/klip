name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality Gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Ensure reliable npm version
        run: npm install -g npm@10.9.4

      - name: Install Node dependencies (with retry)
        shell: bash
        env:
          HUSKY: 0
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          set -o pipefail
          echo "npm registry: $(npm config get registry)"

          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi

            echo "npm ci failed (attempt ${attempt}/3)."
            if [ "${attempt}" -lt 3 ]; then
              echo "cleaning npm cache and retrying..."
              npm cache clean --force || true
              sleep 5
              continue
            fi

            npm_cache="$(npm config get cache || true)"
            if [ -n "${npm_cache}" ] && [ -d "${npm_cache}/_logs" ]; then
              echo "dumping npm debug logs from ${npm_cache}/_logs"
              ls -la "${npm_cache}/_logs" || true
              for log_file in "${npm_cache}"/_logs/*-debug-0.log; do
                [ -f "${log_file}" ] || continue
                echo "----- ${log_file} -----"
                cat "${log_file}" || true
              done
            fi

            exit 1
          done

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Install Playwright Chromium
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "Linux" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install chromium
          fi

      - name: E2E
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Coverage
        run: npm run test:coverage

      - name: Setup Rust
        if: ${{ hashFiles('src-tauri/Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Install Linux system dependencies
        if: ${{ runner.os == 'Linux' && hashFiles('src-tauri/Cargo.toml') != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust
        if: ${{ hashFiles('src-tauri/Cargo.toml') != '' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo check
        if: ${{ hashFiles('src-tauri/Cargo.toml') != '' }}
        run: npm run cargo:check
