name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Setup Rust
        if: ${{ hashFiles('src-tauri/Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        if: ${{ hashFiles('src-tauri/Cargo.toml') != '' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo check
        if: ${{ hashFiles('src-tauri/Cargo.toml') != '' }}
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked
