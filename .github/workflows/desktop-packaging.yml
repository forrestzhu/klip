name: Desktop Packaging

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.84.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Resolve macOS bundle mode
        if: runner.os == 'macOS'
        id: macos_bundle_mode
        shell: bash
        env:
          APPLE_CERTIFICATE_SECRET: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8_SECRET: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          mode="unsigned"

          if [ -n "${APPLE_CERTIFICATE_SECRET}" ] && [ -n "${APPLE_CERTIFICATE_PASSWORD_SECRET}" ]; then
            mode="signed"
          fi

          if [ "${mode}" = "signed" ] \
            && [ -n "${APPLE_API_KEY_SECRET}" ] \
            && [ -n "${APPLE_API_ISSUER_SECRET}" ] \
            && [ -n "${APPLE_API_KEY_P8_SECRET}" ]; then
            mode="signed-and-notarized"
          fi

          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "macOS bundle mode: ${mode}"

      - name: Prepare App Store Connect API key
        if: runner.os == 'macOS' && steps.macos_bundle_mode.outputs.mode == 'signed-and-notarized'
        shell: bash
        env:
          APPLE_API_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_SECRET: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_SECRET}.p8"
          printf '%s' "${APPLE_API_KEY_P8_SECRET}" > "${key_path}"
          chmod 600 "${key_path}"
          echo "APPLE_API_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"

      - name: Build desktop bundles (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_BUNDLE_MODE: ${{ steps.macos_bundle_mode.outputs.mode }}
          APPLE_CERTIFICATE_SECRET: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ "${MACOS_BUNDLE_MODE}" = "unsigned" ]; then
            npm run build:desktop:bundle:macos
            exit 0
          fi

          export APPLE_CERTIFICATE="${APPLE_CERTIFICATE_SECRET}"
          export APPLE_CERTIFICATE_PASSWORD="${APPLE_CERTIFICATE_PASSWORD_SECRET}"

          if [ -n "${APPLE_SIGNING_IDENTITY_SECRET}" ]; then
            export APPLE_SIGNING_IDENTITY="${APPLE_SIGNING_IDENTITY_SECRET}"
          fi

          if [ "${MACOS_BUNDLE_MODE}" = "signed-and-notarized" ]; then
            export APPLE_API_KEY="${APPLE_API_KEY_SECRET}"
            export APPLE_API_ISSUER="${APPLE_API_ISSUER_SECRET}"
            export APPLE_API_KEY_PATH
          fi

          npm run build:desktop:bundle:macos:signed

      - name: Build desktop bundles (Windows)
        if: runner.os == 'Windows'
        run: npm run build:desktop:bundle:windows

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: klip-bundles-${{ matrix.os }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: klip-bundles-*
          merge-multiple: true
          path: release-assets

      - name: Render release notes
        shell: bash
        run: |
          sed "s/{{TAG_NAME}}/${GITHUB_REF_NAME}/g" \
            .github/release-notes-template.md > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Klip ${{ github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
